<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AR Menu</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #ar-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    #closeBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: white;
      border: none;
      font-size: 22px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
    }

    #label {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
  </style>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mind-ar-image-three.prod.js"></script>
</head>

<body>

<div id="ar-container"></div>
<button id="closeBtn">✕</button>
<div id="label">Loading...</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { MindARThree } from "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js";

const item = new URLSearchParams(window.location.search).get("item") || "burger";

const models = {
  burger: "./assets/burger.glb",
  pizza: "./assets/pizza.glb",
  sushi: "./assets/sushi.glb"
};

function loadModel(path) {
  return new Promise((resolve, reject) => {
    const loader = new GLTFLoader();
    loader.load(path, resolve, undefined, reject);
  });
}

async function startAR() {
  try {
    const mindarThree = new MindARThree({
      container: document.querySelector("#ar-container"),
      imageTargetSrc: "./target.mind"
    });

    const { renderer, scene, camera } = mindarThree;

    const anchor = mindarThree.addAnchor(0);

    const gltf = await loadModel(models[item]);

    const model = gltf.scene;

    model.scale.set(0.5, 0.5, 0.5);
    model.position.set(0, -0.5, 0);

    anchor.group.add(model);

    await mindarThree.start();

    renderer.setAnimationLoop(() => {
      model.rotation.y += 0.01;
      renderer.render(scene, camera);
    });

  } catch (err) {
    console.error(err);
    alert("AR failed — check console (F12)");
  }
}

startAR();
</script>

</body>
</html>
